<!DOCTYPE html>
<html lang="ko">
<head>

    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
            background-color: #F2F4F6;
            color: #191F28;
            -webkit-tap-highlight-color: transparent;
            padding-bottom: env(safe-area-inset-bottom);
            overflow-x: hidden;
        }
        ::-webkit-scrollbar { display: none; }

        .slide-in-right { animation: slideInFromRight 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideInFromRight { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        .slide-in-left { animation: slideInFromLeft 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideInFromLeft { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .animate-fade-in { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 로딩 화면 */
        .loading-screen { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; width: 100%; position: fixed; top: 0; left: 0; background: #fff; z-index: 9999; }
        .spinner { width: 35px; height: 35px; border: 3px solid #E5E7EB; border-top: 3px solid #3182F6; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .safe-top { padding-top: env(safe-area-inset-top); }
        .drag-over { background-color: rgba(49, 130, 246, 0.1) !important; border: 2px dashed #3182F6 !important; }
        .calendar-cell { min-height: 95px; border: 0.5px solid #f8f9fa; }
    </style>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js'></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- 모듈 임포트 설정 -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.292.0",
            "firebase/app": "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js",
            "firebase/firestore": "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js"
        }
    }
    </script>
</head>
<body>
    <div id="root">
        <div class="loading-screen" id="initial-loader">
            <div class="spinner mb-4"></div>
            <span class="text-gray-400 text-sm font-bold">클라우드 서버 연결 중...</span>
        </div>
    </div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
            ChevronLeft, ChevronRight, Plus, Calendar as CalendarIcon, 
            PieChart as ChartIcon, Trash2, TrendingUp, TrendingDown, 
            Repeat, X, CheckCircle, AlertCircle, ClipboardPaste, Camera, Wand2,
            Download, Upload, PiggyBank
        } from 'lucide-react';
        
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from 'firebase/auth';
        import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc } from 'firebase/firestore';

        // ==========================================
        // 1. 초기 데이터 및 상수 설정
        // ==========================================
        const CATEGORIES = {
            expense: ['식비', '교통', '문화/생활', '쇼핑/뷰티', '의료/건강', '교육', '공과금', '저축/보험', '대출이자', '기타'],
            income: ['급여', '용돈', '금융수입', '기타']
        };

        const INITIAL_DATA = [
            { id: "init-1", date: new Date().toISOString().split('T')[0], type: 'expense', category: '기타', amount: 0, memo: '환영합니다! 첫 기록을 남겨보세요.' }
        ];

        // ==========================================
        // 2. Firebase 연결 설정
        // ==========================================
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyANmiRNqD4FxMySH4ISKU5EczhpBjhJQ4A",
            authDomain: "santa-kim.firebaseapp.com",
            projectId: "santa-kim",
            storageBucket: "santa-kim.firebasestorage.app",
            messagingSenderId: "1025531637137",
            appId: "1:1025531637137:web:3363df3582b6a19cd7fe30"
        };

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'family-money-pro';
        const getColPath = (colName) => `artifacts/${appId}/public/data/${colName}`;

        let firebaseApp, auth, db;
        const isFirebaseReady = firebaseConfig.apiKey && firebaseConfig.apiKey !== "";
        if (isFirebaseReady) {
            firebaseApp = initializeApp(firebaseConfig);
            auth = getAuth(firebaseApp);
            db = getFirestore(firebaseApp);
        }

        // ==========================================
        // 3. 유틸리티 함수
        // ==========================================
        const formatCurrency = (val) => new Intl.NumberFormat('ko-KR').format(val);
        const generateId = () => {
            if (typeof crypto !== 'undefined' && typeof crypto.randomUUID === 'function') return crypto.randomUUID();
            return Math.random().toString(36).substring(2, 15) + Date.now().toString(36);
        };

        // ==========================================
        // 4. 메인 앱 컴포넌트
        // ==========================================
        function App() {
            // --- Refs ---
            const fileInputRef = useRef(null);
            const importInputRef = useRef(null);
            const workerRef = useRef(null);
            const touchStart = useRef(null);

            // --- State ---
            const [user, setUser] = useState(null);
            const [transactions, setTransactions] = useState(() => {
                const localData = localStorage.getItem('moneybook_pro_local');
                return localData ? JSON.parse(localData) : INITIAL_DATA;
            });
            const [recurringItems, setRecurringItems] = useState(() => {
                const localRec = localStorage.getItem('moneybook_rec_local');
                return localRec ? JSON.parse(localRec) : [];
            });
            
            const [currentDate, setCurrentDate] = useState(new Date());
            const [viewMode, setViewMode] = useState('calendar'); // 'calendar' | 'stats'
            const [slideDirection, setSlideDirection] = useState('none');
            const [ocrLoading, setOcrLoading] = useState(false);
            
            // 모달 상태
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [isRecurringModalOpen, setIsRecurringModalOpen] = useState(false);
            const [isParserOpen, setIsParserOpen] = useState(false);
            const [editingId, setEditingId] = useState(null);
            
            // 폼 상태
            const [formState, setFormState] = useState({ 
                type: 'expense', 
                date: new Date().toISOString().split('T')[0], 
                category: '식비', 
                amount: '', 
                memo: '' 
            });
            const [smsText, setSmsText] = useState('');
            const [alert, setAlert] = useState({ show: false, message: '', type: 'success' });
            const [confirmModal, setConfirmModal] = useState({ isOpen: false, message: '', onConfirm: null });

            // --- Effects ---
            
            // 초기 로딩 화면 숨김
            useEffect(() => {
                const loader = document.getElementById('initial-loader');
                if (loader) loader.style.display = 'none';
            }, []);

            // 로컬 스토리지 자동 백업 (Firebase 미사용시)
            useEffect(() => {
                if (!isFirebaseReady) {
                    localStorage.setItem('moneybook_pro_local', JSON.stringify(transactions));
                    localStorage.setItem('moneybook_rec_local', JSON.stringify(recurringItems));
                }
            }, [transactions, recurringItems]);

            // Firebase 인증 및 데이터 동기화
            useEffect(() => {
                if (!isFirebaseReady) return;

                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (e) { console.error("Firebase Auth Fail:", e); }
                };
                initAuth();

                const unsubAuth = onAuthStateChanged(auth, (currentUser) => {
                    setUser(currentUser);
                    if (currentUser) {
                        const unsubTx = onSnapshot(collection(db, getColPath('transactions')), (snap) => {
                            setTransactions(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                        });
                        const unsubRec = onSnapshot(collection(db, getColPath('recurring')), (snap) => {
                            setRecurringItems(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                        });
                        return () => { unsubTx(); unsubRec(); };
                    }
                });
                return () => unsubAuth();
            }, []);

            // --- 데이터 연산 (Memoization) ---
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();

            const monthlyData = useMemo(() => transactions.filter(t => {
                const d = new Date(t.date);
                return d.getFullYear() === year && d.getMonth() === month;
            }).sort((a, b) => new Date(b.date) - new Date(a.date)), [transactions, year, month]);

            const summary = useMemo(() => monthlyData.reduce((acc, curr) => {
                acc[curr.type] += Number(curr.amount);
                return acc;
            }, { income: 0, expense: 0 }), [monthlyData]);

            // 이번 달에 해당하는 고정 내역 필터링 (연단위/월단위)
            const activeRecurring = useMemo(() => recurringItems.filter(item => 
                (item.frequency === 'monthly') || 
                (item.frequency === 'yearly' && Number(item.month) === (month + 1))
            ), [recurringItems, month]);

            // --- Chart.js 렌더링 ---
            useEffect(() => {
                if (viewMode === 'stats' && monthlyData.length > 0) {
                    const ctx = document.getElementById('expenseChart');
                    if (!ctx) return;
                    
                    const dataByCat = monthlyData.filter(t => t.type === 'expense').reduce((acc, curr) => {
                        acc[curr.category] = (acc[curr.category] || 0) + Number(curr.amount);
                        return acc;
                    }, {});
                    
                    if (window.myChart) window.myChart.destroy();
                    
                    window.myChart = new Chart(ctx, {
                        type: 'doughnut',
                        data: {
                            labels: Object.keys(dataByCat),
                            datasets: [{
                                data: Object.values(dataByCat),
                                backgroundColor: ['#FF6B6B', '#4DABF7', '#FFD43B', '#63E6BE', '#BE4BDB', '#FAB005', '#748FFC', '#A9E34B']
                            }]
                        },
                        options: { 
                            plugins: { legend: { position: 'bottom' } }, 
                            cutout: '70%', 
                            maintainAspectRatio: false 
                        }
                    });
                }
            }, [viewMode, monthlyData]);

            // --- UI 핸들러 ---
            const showAlert = (msg, type = 'success') => {
                setAlert({ show: true, message: msg, type });
                setTimeout(() => setAlert({ show: false, message: '', type: 'success' }), 3000);
            };

            const askConfirm = (msg, onConfirmCallback) => {
                setConfirmModal({ isOpen: true, message: msg, onConfirm: onConfirmCallback });
            };

            const handleConfirm = () => {
                if (confirmModal.onConfirm) confirmModal.onConfirm();
                setConfirmModal({ isOpen: false, message: '', onConfirm: null });
            };

            // 월 이동 (슬라이드 방향 설정 포함)
            const handleMonthMove = (dir) => {
                setSlideDirection(dir === 1 ? 'right' : 'left');
                setCurrentDate(new Date(year, month + dir, 1));
            };

            // 모바일 스와이프
            const onTS = (e) => { touchStart.current = e.touches[0].clientX; };
            const onTE = (e) => {
                if (!touchStart.current) return;
                const diff = touchStart.current - e.changedTouches[0].clientX;
                if (diff > 50) handleMonthMove(1);
                else if (diff < -50) handleMonthMove(-1);
                touchStart.current = null;
            };

            // --- 데이터베이스 CRUD 핸들러 ---
            const saveTransaction = async (data) => {
                const id = editingId || generateId();
                const payload = { ...data, amount: Number(data.amount) };
                
                if (isFirebaseReady && user) {
                    try {
                        await setDoc(doc(db, getColPath('transactions'), id), payload);
                    } catch(e) { showAlert('클라우드 저장 실패', 'error'); return; }
                } else {
                    const newList = editingId ? transactions.map(t => t.id === id ? payload : t) : [...transactions, { ...payload, id }];
                    setTransactions(newList);
                }
                
                setIsModalOpen(false);
                setEditingId(null);
                showAlert(editingId ? "수정되었습니다." : "저장되었습니다.");
            };

            // [수정 포인트 1]: 일반 지출 삭제 버그 완전 수정
            const deleteTransaction = async (id) => {
                askConfirm("정말 삭제하시겠습니까?", async () => {
                    if (isFirebaseReady && user) {
                        await deleteDoc(doc(db, getColPath('transactions'), id));
                    } else {
                        // 삭제 즉시 상태를 업데이트하고 로컬 스토리지에 강제 저장하여 꼬임을 방지합니다.
                        setTransactions(prev => {
                            const updatedList = prev.filter(t => t.id !== id);
                            localStorage.setItem('moneybook_pro_local', JSON.stringify(updatedList));
                            return updatedList;
                        });
                    }
                    setIsModalOpen(false);
                    showAlert("삭제되었습니다.");
                });
            };

            // [수정 포인트 3]: 고정 지출을 현재 표시된 달력에 일괄 반영하는 함수 분리
            const applyRecurringToCurrentMonth = async () => {
                askConfirm(`${month + 1}월 달력에 고정 내역을 일괄 등록할까요?`, async () => {
                    const promises = [];
                    let count = 0;
                    const newTransactions = [...transactions];

                    activeRecurring.forEach(item => {
                        const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(item.day).padStart(2,'0')}`;
                        if(!transactions.some(t => t.date === dateStr && t.memo === item.memo)) {
                            const newId = generateId();
                            const payload = { ...item, date: dateStr, amount: Number(item.amount) };
                            if (isFirebaseReady && user) promises.push(setDoc(doc(db, getColPath('transactions'), newId), payload));
                            else newTransactions.push({ ...payload, id: newId });
                            count++;
                        }
                    });

                    if (isFirebaseReady && user) {
                        await Promise.all(promises);
                    } else {
                        setTransactions(newTransactions);
                        localStorage.setItem('moneybook_pro_local', JSON.stringify(newTransactions));
                    }
                    
                    showAlert(`${count}건이 이번 달 내역에 반영되었습니다.`);
                    setIsRecurringModalOpen(false);
                });
            };

            // 드래그 앤 드롭 날짜 변경
            const handleDropUpdate = async (id, newDate) => {
                const target = transactions.find(t => t.id === id);
                if (target) {
                    const updated = { ...target, date: newDate };
                    if (isFirebaseReady && user) {
                        await setDoc(doc(db, getColPath('transactions'), id), updated);
                    } else {
                        setTransactions(prev => prev.map(t => t.id === id ? updated : t));
                    }
                    showAlert("날짜가 변경되었습니다.");
                }
            };

            // --- 백업 및 복원 (가져오기/내보내기) ---
            const exportData = () => {
                const blob = new Blob([JSON.stringify({ transactions, recurringItems })], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `가계부_백업_${new Date().toISOString().split('T')[0]}.json`;
                a.click();
            };

            const importData = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = async (ev) => {
                    try {
                        const data = JSON.parse(ev.target.result);
                        askConfirm("기존 데이터를 덮어쓰고 복원할까요?", async () => {
                            if (isFirebaseReady && user) {
                                // 클라우드 동기화 모드일 땐 하나씩 업로드
                                const promises = [];
                                if(data.transactions) data.transactions.forEach(t => promises.push(setDoc(doc(db, getColPath('transactions'), t.id), t)));
                                if(data.recurringItems) data.recurringItems.forEach(r => promises.push(setDoc(doc(db, getColPath('recurring'), r.id), r)));
                                await Promise.all(promises);
                            } else {
                                if(data.transactions) setTransactions(data.transactions);
                                if(data.recurringItems) setRecurringItems(data.recurringItems);
                            }
                            showAlert("데이터 복원이 완료되었습니다.");
                        });
                    } catch (err) {
                        showAlert("파일 형식이 올바르지 않습니다.", "error");
                    }
                };
                reader.readAsText(file);
                if(importInputRef.current) importInputRef.current.value = '';
            };

            // --- OCR 파싱 (Tesseract) ---
            const handleOCR = async (file) => {
                if (!file) return;
                setOcrLoading(true);
                try {
                    if (!workerRef.current) {
                        workerRef.current = await Tesseract.createWorker('kor+eng');
                    }
                    const { data: { text } } = await workerRef.current.recognize(file);
                    
                    const amountMatch = text.replace(/,/g, '').match(/\d{3,}/);
                    
                    setFormState({
                        type: 'expense',
                        date: new Date().toISOString().split('T')[0],
                        category: '식비',
                        amount: amountMatch ? parseInt(amountMatch[0]) : '',
                        memo: '영수증 자동인식 (내용 수정)'
                    });
                    setEditingId(null);
                    setIsModalOpen(true);
                } catch (e) { 
                    showAlert("사진 인식에 실패했습니다.", "error"); 
                } finally { 
                    setOcrLoading(false); 
                    if(fileInputRef.current) fileInputRef.current.value = ""; 
                }
            };

            // --- SMS 문자 파서 ---
            const parseSmsMsg = () => {
                if (!smsText.trim()) return;
                let amt = 0, memo = '카드결제', dt = formState.date, ty = 'expense';
                
                const amtMatch = smsText.match(/([0-9]{1,3}(,[0-9]{3})+)|([0-9]+)원/);
                if (amtMatch) amt = parseInt(amtMatch[0].replace(/[^0-9]/g, ''));
                
                if (smsText.includes('입금') || smsText.includes('급여')) ty = 'income';
                
                setFormState(prev => ({ ...prev, amount: amt || prev.amount, type: ty, memo, category: CATEGORIES[ty][0] }));
                setIsParserOpen(false); 
                setSmsText('');
            };

            // --- 메인 렌더링 ---
            return (
                <div className="max-w-xl mx-auto min-h-screen bg-[#F2F4F6] pb-24 relative shadow-2xl overflow-hidden" onTouchStart={onTS} onTouchEnd={onTE}>
                    
                    {/* 상단바 */}
                    <nav className="bg-white sticky top-0 z-40 safe-top border-b border-gray-100 px-4 h-14 flex items-center justify-between shadow-sm">
                        <div className="flex items-center gap-2">
                            <div className="w-8 h-8 bg-[#3182F6] rounded-xl flex items-center justify-center text-white shadow-lg font-bold">₩</div>
                            <h1 className="font-bold text-lg text-gray-800">가족 가계부 PRO</h1>
                            {isFirebaseReady && user && <span className="w-2.5 h-2.5 rounded-full bg-emerald-400 animate-pulse ml-1" title="동기화 중"></span>}
                        </div>
                        <div className="flex gap-1">
                            <button onClick={exportData} title="백업 다운로드" className="p-2 text-gray-400 active:text-blue-500 transition-colors"><Download size={20}/></button>
                            <label className="p-2 text-gray-400 cursor-pointer active:text-blue-500 transition-colors" title="백업 불러오기">
                                <Upload size={20}/>
                                <input type="file" ref={importInputRef} className="hidden" accept=".json" onChange={importData}/>
                            </label>
                            <button onClick={() => setIsRecurringModalOpen(true)} title="고정 지출" className="p-2 text-gray-400 active:text-blue-500 transition-colors"><Repeat size={20}/></button>
                        </div>
                    </nav>

                    <main className="p-4 space-y-4">
                        {/* 요약 대시보드 및 연/월 선택 */}
                        <div className="bg-white rounded-[24px] p-6 shadow-sm border border-gray-50">
                            <div className="flex justify-between items-center mb-6">
                                <div className="flex items-center bg-gray-100 rounded-full px-1 py-0.5">
                                    <button onClick={() => handleMonthMove(-1)} className="p-1 text-gray-500 active:bg-gray-200 rounded-full"><ChevronLeft size={18}/></button>
                                    <div className="flex items-center text-sm font-bold text-gray-800">
                                        <select value={year} onChange={e => setCurrentDate(new Date(Number(e.target.value), month, 1))} className="bg-transparent outline-none appearance-none px-1" style={{WebkitAppearance:'none'}}>
                                            {Array.from({length:11},(_,i)=>new Date().getFullYear()-5+i).map(y=><option key={y} value={y}>{y}년</option>)}
                                        </select>
                                        <select value={month} onChange={e => setCurrentDate(new Date(year, Number(e.target.value), 1))} className="bg-transparent outline-none appearance-none px-1" style={{WebkitAppearance:'none'}}>
                                            {Array.from({length:12},(_,i)=>i).map(m=><option key={m} value={m}>{m+1}월</option>)}
                                        </select>
                                    </div>
                                    <button onClick={() => handleMonthMove(1)} className="p-1 text-gray-500 active:bg-gray-200 rounded-full"><ChevronRight size={18}/></button>
                                </div>
                                <div className="text-right">
                                    <span className="text-[10px] text-gray-400 font-bold uppercase tracking-wider block">이번 달 잔액</span>
                                    <span className="text-2xl font-black text-[#191F28]">{formatCurrency(summary.income - summary.expense)}원</span>
                                </div>
                            </div>
                            <div className="grid grid-cols-2 gap-3">
                                <div className="bg-[#E8F3FF] p-4 rounded-2xl flex flex-col items-center">
                                    <span className="text-[10px] font-bold text-[#3182F6] uppercase mb-1 flex items-center gap-1"><TrendingUp size={12}/> 수입</span>
                                    <div className="font-bold text-blue-700 text-lg">+{formatCurrency(summary.income)}</div>
                                </div>
                                <div className="bg-[#FFF0F0] p-4 rounded-2xl flex flex-col items-center">
                                    <span className="text-[10px] font-bold text-[#F04452] uppercase mb-1 flex items-center gap-1"><TrendingDown size={12}/> 지출</span>
                                    <div className="font-bold text-red-700 text-lg">-{formatCurrency(summary.expense)}</div>
                                </div>
                            </div>
                        </div>

                        {/* 탭 전환 (달력/통계) */}
                        <div className="flex bg-white rounded-2xl p-1 shadow-sm border border-gray-50">
                            <button onClick={() => setViewMode('calendar')} className={`flex-1 py-2.5 rounded-xl text-sm font-bold flex justify-center items-center gap-2 transition-all ${viewMode === 'calendar' ? 'bg-[#3182F6] text-white shadow-md' : 'text-gray-400'}`}>
                                <CalendarIcon size={16}/> 달력
                            </button>
                            <button onClick={() => setViewMode('stats')} className={`flex-1 py-2.5 rounded-xl text-sm font-bold flex justify-center items-center gap-2 transition-all ${viewMode === 'stats' ? 'bg-[#3182F6] text-white shadow-md' : 'text-gray-400'}`}>
                                <ChartIcon size={16}/> 분석
                            </button>
                        </div>

                        {/* 메인 뷰 */}
                        {viewMode === 'calendar' ? (
                            <div className={`bg-white rounded-[24px] p-2 shadow-sm border border-gray-50 overflow-hidden ${slideDirection === 'right' ? 'slide-in-right' : slideDirection === 'left' ? 'slide-in-left' : ''}`}>
                                <div className="grid grid-cols-7 mb-2 border-b border-gray-50 py-2">
                                    {['일','월','화','수','목','금','토'].map((d, i) => (
                                        <div key={d} className={`text-center text-[10px] font-bold ${i === 0 ? 'text-red-400' : i === 6 ? 'text-blue-400' : 'text-gray-400'}`}>{d}</div>
                                    ))}
                                </div>
                                <CalendarGrid 
                                    year={year} month={month} transactions={transactions}
                                    onDateClick={(date) => { setFormState({ ...formState, date, amount: '', memo: '' }); setEditingId(null); setIsModalOpen(true); }}
                                    onEdit={(t) => { setFormState(t); setEditingId(t.id); setIsModalOpen(true); }}
                                    onDrop={handleDropUpdate}
                                />
                            </div>
                        ) : (
                            <div className="space-y-4 animate-fade-in">
                                <div className="bg-white rounded-[24px] p-6 shadow-sm border border-gray-50 flex flex-col items-center">
                                    <h3 className="font-bold text-gray-800 mb-4 w-full text-sm">이달의 지출 비율</h3>
                                    <div className="w-full h-64 relative"><canvas id="expenseChart"></canvas></div>
                                </div>
                                <div className="bg-white rounded-[24px] p-6 shadow-sm border border-gray-50">
                                    <h3 className="font-bold text-gray-800 mb-4 text-sm tracking-widest uppercase">Transaction History</h3>
                                    <TransactionList items={monthlyData} onEdit={(t) => { setFormState(t); setEditingId(t.id); setIsModalOpen(true); }} />
                                </div>
                            </div>
                        )}

                        {/* 이달의 예정 고정 내역 요약 */}
                        <div className="bg-white rounded-[24px] p-5 shadow-sm border border-gray-50 mb-20">
                            {/* [수정 포인트 2]: 메인 화면 고정 지출 전용 '이달 내역에 반영' 버튼 추가 */}
                            <div className="flex justify-between items-center mb-4">
                                <h3 className="text-sm font-bold text-gray-700 flex items-center gap-2">
                                    <PiggyBank size={16} className="text-[#3182F6]" /> 이달 예정 고정 입출금
                                </h3>
                                {activeRecurring.length > 0 && (
                                    <button 
                                        onClick={applyRecurringToCurrentMonth} 
                                        className="text-[11px] bg-[#E8F3FF] text-[#3182F6] px-3 py-1.5 rounded-xl font-bold active:bg-blue-100 transition-colors shadow-sm"
                                    >
                                        이달 내역에 반영
                                    </button>
                                )}
                            </div>
                            <div className="flex gap-3 overflow-x-auto pb-2 snap-x">
                                {activeRecurring.length === 0 ? (
                                    <p className="text-xs text-gray-300 w-full text-center py-4 italic">등록된 내역이 없거나 이번 달 예정이 없습니다.</p>
                                ) : activeRecurring.map(item => (
                                    <div key={item.id} className="min-w-[140px] snap-center bg-gray-50 rounded-2xl p-4 flex flex-col justify-between h-24 border border-gray-100 shrink-0">
                                        <div className="text-xs font-bold text-gray-800 truncate">{item.memo}</div>
                                        <div className="flex flex-col items-start gap-1">
                                            <span className="text-[9px] font-bold text-gray-400 bg-white px-1.5 py-0.5 rounded border border-gray-100">
                                                {item.frequency === 'yearly' ? `${item.month}월 ${item.day}일` : `매월 ${item.day}일`}
                                            </span>
                                            <span className={`text-xs font-black ${item.type === 'income' ? 'text-blue-500' : 'text-red-500'}`}>
                                                {formatCurrency(item.amount)}
                                            </span>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </main>

                    {/* --- FAB (Floating Buttons) --- */}
                    {/* [오류 해결 핵심]: input 태그를 button 바깥으로 분리하여 ref 참조 오류 및 이벤트 꼬임 방지 */}
                    <div className="fixed bottom-8 right-6 flex flex-col gap-3 z-30">
                        <input type="file" ref={fileInputRef} className="hidden" accept="image/*" onChange={(e) => handleOCR(e.target.files[0])}/>
                        <button onClick={() => fileInputRef.current?.click()} className="w-12 h-12 bg-white rounded-full shadow-xl flex items-center justify-center text-gray-600 active:scale-90 transition-transform hover:bg-gray-50">
                            <Camera size={24}/>
                        </button>
                        <button onClick={() => { setFormState({...formState, date: new Date().toISOString().split('T')[0], amount:'', memo:''}); setEditingId(null); setIsModalOpen(true); }} className="w-14 h-14 bg-[#3182F6] rounded-full shadow-2xl flex items-center justify-center text-white active:scale-90 transition-transform hover:bg-[#2563EB]">
                            <Plus size={32}/>
                        </button>
                    </div>

                    {/* --- 오버레이 및 모달 영역 --- */}
                    
                    {/* OCR 로딩 */}
                    {ocrLoading && (
                        <div className="fixed inset-0 bg-white/90 z-[100] flex flex-col items-center justify-center animate-fade-in text-center p-10">
                            <div className="spinner mb-6"></div>
                            <p className="font-bold text-lg text-gray-800 leading-tight">영수증을 읽고 있어요</p>
                            <p className="text-gray-400 text-sm mt-2 font-medium">잠시만 기다려 주세요 (최대 10초)</p>
                        </div>
                    )}

                    {/* 토스트 알림 */}
                    {alert.show && (
                        <div className="fixed top-14 left-1/2 -translate-x-1/2 z-[110] animate-slide-up px-6 py-3 bg-gray-800 text-white text-xs font-bold rounded-full shadow-lg flex items-center gap-2">
                            {alert.type === 'success' ? <CheckCircle size={14} className="text-green-400"/> : <AlertCircle size={14} className="text-red-400"/>}
                            {alert.message}
                        </div>
                    )}

                    {/* 확인용 다이얼로그 */}
                    {confirmModal.isOpen && (
                        <div className="fixed inset-0 z-[120] flex items-center justify-center p-6 animate-fade-in">
                            <div className="fixed inset-0 bg-black/40 backdrop-blur-[2px]" onClick={() => setConfirmModal({...confirmModal, isOpen: false})}></div>
                            <div className="bg-white w-full max-w-xs rounded-3xl p-6 shadow-2xl text-center z-10">
                                <h3 className="text-lg font-bold text-gray-900 mb-2">확인해주세요</h3>
                                <p className="text-gray-500 text-sm mb-6 whitespace-pre-wrap">{confirmModal.message}</p>
                                <div className="flex gap-3">
                                    <button onClick={() => setConfirmModal({...confirmModal, isOpen: false})} className="flex-1 py-3 bg-gray-100 text-gray-600 font-bold rounded-xl active:bg-gray-200">취소</button>
                                    <button onClick={handleConfirm} className="flex-1 py-3 bg-gray-900 text-white font-bold rounded-xl active:scale-[0.98] transition-transform">확인</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 입력 모달 */}
                    {isModalOpen && (
                        <Modal title={editingId ? "내역 수정하기" : "새로운 거래 기록"} onClose={() => setIsModalOpen(false)}>
                            {!editingId && (
                                <button onClick={() => { setIsModalOpen(false); setIsParserOpen(true); }} className="w-full mb-6 py-3 border-2 border-dashed border-indigo-100 bg-indigo-50 text-indigo-600 rounded-2xl flex items-center justify-center gap-2 text-sm font-bold active:bg-indigo-100 transition-colors">
                                    <ClipboardPaste size={18} /> 은행/카드사 문자 복사해서 입력
                                </button>
                            )}
                            <EntryForm data={formState} onSave={saveTransaction} onDelete={() => deleteTransaction(editingId)} isEdit={!!editingId} />
                        </Modal>
                    )}

                    {/* 스마트 문자 인식 모달 */}
                    {isParserOpen && (
                        <Modal title="스마트 문자 분석" onClose={() => setIsParserOpen(false)}>
                            <p className="text-[11px] text-gray-400 mb-3 font-medium">결제 문자나 입금 알림을 아래에 붙여넣으세요.</p>
                            <textarea className="w-full p-4 bg-gray-50 rounded-2xl h-40 outline-none text-sm resize-none mb-4 focus:ring-2 focus:ring-indigo-500 font-bold" placeholder="예) [OO카드] 10/25 12:30 12,000원 결제 완료..." value={smsText} onChange={(e) => setSmsText(e.target.value)}></textarea>
                            <button onClick={parseSmsMsg} className="w-full py-4 bg-indigo-500 text-white font-bold rounded-2xl active:scale-[0.98]">분석 및 자동입력</button>
                        </Modal>
                    )}

                    {/* 고정 지출/수입 모달 (매년/매월) */}
                    {isRecurringModalOpen && (
                        <Modal title="고정 입출금 설정" onClose={() => setIsRecurringModalOpen(false)}>
                            <RecurringManager 
                                list={recurringItems} 
                                onAdd={async (item) => {
                                    const id = generateId();
                                    if (isFirebaseReady && user) await setDoc(doc(db, getColPath('recurring'), id), item);
                                    else {
                                        const newList = [...recurringItems, { ...item, id }];
                                        setRecurringItems(newList);
                                        localStorage.setItem('moneybook_rec_local', JSON.stringify(newList));
                                    }
                                    showAlert("반복 내역 등록 완료");
                                }}
                                onDelete={async (id) => {
                                    askConfirm("해당 고정 설정을 삭제하시겠습니까?", async () => {
                                        if (isFirebaseReady && user) await deleteDoc(doc(db, getColPath('recurring'), id));
                                        else {
                                            const newList = recurringItems.filter(i => i.id !== id);
                                            setRecurringItems(newList);
                                            localStorage.setItem('moneybook_rec_local', JSON.stringify(newList));
                                        }
                                        showAlert("삭제되었습니다.");
                                    });
                                }}
                                onApply={applyRecurringToCurrentMonth}
                            />
                        </Modal>
                    )}
                </div>
            );
        }

        // ==========================================
        // 5. 서브 컴포넌트: 달력 그리드
        // ==========================================
        function CalendarGrid({ year, month, transactions, onDateClick, onEdit, onDrop }) {
            const firstDay = new Date(year, month, 1).getDay();
            const lastDate = new Date(year, month + 1, 0).getDate();
            const days = Array.from({length: firstDay}, () => null).concat(Array.from({length: lastDate}, (_, i) => i + 1));

            return (
                <div className="grid grid-cols-7 gap-px bg-gray-50 border border-gray-50">
                    {days.map((day, idx) => {
                        const dateStr = day ? `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}` : '';
                        const txs = transactions.filter(t => t.date === dateStr);
                        return (
                            <div 
                                key={idx} onClick={() => day && onDateClick(dateStr)}
                                onDragOver={e => { if(day) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); } }}
                                onDragLeave={e => e.currentTarget.classList.remove('drag-over')}
                                onDrop={e => {
                                    e.preventDefault();
                                    e.currentTarget.classList.remove('drag-over');
                                    const id = e.dataTransfer.getData("text/plain");
                                    if(id && dateStr) onDrop(id, dateStr);
                                }}
                                className={`calendar-cell bg-white p-1 flex flex-col transition-colors ${day ? 'active:bg-gray-100 cursor-pointer' : 'opacity-0 pointer-events-none'}`}
                            >
                                <span className={`text-[10px] font-black block mb-1 text-center ${new Date(dateStr).getDay() === 0 ? 'text-red-400' : 'text-gray-400'}`}>{day}</span>
                                <div className="space-y-0.5">
                                    {txs.slice(0, 3).map(t => (
                                        <div 
                                            key={t.id} draggable onDragStart={e => e.dataTransfer.setData("text/plain", t.id)}
                                            onClick={e => { e.stopPropagation(); onEdit(t); }}
                                            className={`text-[8px] font-bold px-1 py-0.5 rounded truncate shadow-sm flex items-center gap-0.5 ${t.type === 'income' ? 'bg-blue-50 text-blue-600' : 'bg-red-50 text-red-500'}`}
                                        >
                                            <span className="shrink-0">{t.type === 'income' ? '↑' : '↓'}</span>
                                            <span className="truncate">{formatCurrency(t.amount).replace('원','')}</span>
                                        </div>
                                    ))}
                                    {txs.length > 3 && <div className="text-[7px] text-gray-300 text-center font-bold">+{txs.length - 3}</div>}
                                </div>
                            </div>
                        );
                    })}
                </div>
            );
        }

        // ==========================================
        // 6. 서브 컴포넌트: 입력 폼
        // ==========================================
        function EntryForm({ data, onSave, onDelete, isEdit }) {
            const [local, setLocal] = useState(data);
            return (
                <form className="space-y-4" onSubmit={e => { e.preventDefault(); onSave(local); }}>
                    <div className="bg-gray-100 p-1 rounded-2xl flex">
                        {['income', 'expense'].map(t => (
                            <button key={t} type="button" onClick={() => setLocal({...local, type: t, category: CATEGORIES[t][0]})} className={`flex-1 py-3.5 rounded-xl text-sm font-black transition-all ${local.type === t ? 'bg-white shadow text-[#3182F6]' : 'text-gray-400'}`}>
                                {t === 'income' ? '수입 (+)' : '지출 (-)'}
                            </button>
                        ))}
                    </div>
                    <div className="grid grid-cols-2 gap-3">
                        <div className="space-y-1"><label className="text-[10px] font-bold text-gray-400 ml-1 uppercase tracking-widest">Date</label><input type="date" className="w-full p-4 bg-gray-50 rounded-2xl font-bold border-none outline-none focus:ring-2 focus:ring-blue-100" value={local.date} onChange={e => setLocal({...local, date: e.target.value})} required/></div>
                        <div className="space-y-1"><label className="text-[10px] font-bold text-gray-400 ml-1 uppercase tracking-widest">Category</label><select className="w-full p-4 bg-gray-50 rounded-2xl font-bold appearance-none border-none outline-none focus:ring-2 focus:ring-blue-100" value={local.category} onChange={e => setLocal({...local, category: e.target.value})}>{CATEGORIES[local.type].map(c => <option key={c} value={c}>{c}</option>)}</select></div>
                    </div>
                    <div className="space-y-1"><label className="text-[10px] font-bold text-gray-400 ml-1 uppercase tracking-widest">Description</label><input type="text" className="w-full p-4 bg-gray-50 rounded-2xl font-bold border-none outline-none focus:ring-2 focus:ring-blue-100" placeholder="상호명 또는 내용" value={local.memo} onChange={e => setLocal({...local, memo: e.target.value})}/></div>
                    <div className="space-y-1"><label className="text-[10px] font-bold text-gray-400 ml-1 uppercase tracking-widest">Amount</label>
                        <div className="relative"><input type="number" className="w-full p-4 bg-gray-50 rounded-2xl text-2xl font-black text-right pr-12 border-none outline-none focus:ring-2 focus:ring-blue-100" placeholder="0" value={local.amount} onChange={e => setLocal({...local, amount: e.target.value})} required/><span className="absolute right-4 top-1/2 -translate-y-1/2 font-black text-gray-300">원</span></div>
                    </div>
                    <div className="flex gap-3 pt-4">
                        {/* [수정 포인트 1 적용 부분] 폼 제출방지와 함수 명확한 바인딩 처리 */}
                        {isEdit && <button type="button" onClick={(e) => { e.preventDefault(); onDelete(); }} className="p-4 bg-red-50 text-red-500 rounded-2xl active:bg-red-100"><Trash2 size={24}/></button>}
                        <button type="submit" className="flex-1 p-4 bg-[#191F28] text-white font-bold rounded-2xl active:scale-[0.98] transition-transform shadow-lg">기록 저장하기</button>
                    </div>
                </form>
            );
        }

        // ==========================================
        // 7. 서브 컴포넌트: 모달 래퍼
        // ==========================================
        function Modal({ title, children, onClose }) {
            return (
                <div className="fixed inset-0 z-[60] flex items-end justify-center px-4 pb-4 animate-fade-in">
                    <div className="fixed inset-0 bg-black/40 backdrop-blur-[2px]" onClick={onClose}></div>
                    <div className="bg-white w-full max-w-xl rounded-[32px] p-6 z-10 animate-slide-up shadow-2xl relative">
                        <div className="flex justify-between items-center mb-6"><h2 className="text-lg font-black text-gray-900 tracking-tighter">{title}</h2><button onClick={onClose} className="p-2 bg-gray-50 rounded-full text-gray-400 hover:bg-gray-100"><X size={20}/></button></div>
                        {children}
                    </div>
                </div>
            );
        }

        // ==========================================
        // 8. 서브 컴포넌트: 거래 내역 리스트
        // ==========================================
        function TransactionList({ items, onEdit }) {
            if (items.length === 0) return <p className="text-center text-gray-300 py-20 italic text-sm font-bold">표시할 내역이 없습니다.</p>;
            return (
                <div className="space-y-3 max-h-[400px] overflow-y-auto pr-1">
                    {items.map(t => (
                        <div key={t.id} onClick={() => onEdit(t)} className="flex justify-between items-center p-4 rounded-2xl hover:bg-gray-50 active:bg-gray-100 transition-colors cursor-pointer bg-white border border-gray-50 shadow-sm">
                            <div className="flex items-center gap-3">
                                <div className={`p-2.5 rounded-xl flex items-center justify-center font-bold ${t.type === 'income' ? 'bg-blue-50 text-blue-500' : 'bg-red-50 text-red-500'}`}>
                                    {t.type === 'income' ? <TrendingUp size={18}/> : <TrendingDown size={18}/>}
                                </div>
                                <div><div className="text-sm font-black text-[#191F28]">{t.memo || t.category}</div><div className="text-[10px] font-bold text-gray-400">{t.date} · {t.category}</div></div>
                            </div>
                            <span className={`font-black text-sm ${t.type === 'income' ? 'text-blue-500' : 'text-red-500'}`}>{t.type === 'income' ? '+' : '-'}{formatCurrency(t.amount)}원</span>
                        </div>
                    ))}
                </div>
            );
        }

        // ==========================================
        // 9. 서브 컴포넌트: 반복 관리 메뉴
        // ==========================================
        function RecurringManager({ list, onAdd, onDelete, onApply }) {
            const [f, setF] = useState({ frequency: 'monthly', month: 1, day: 1, type: 'expense', category: '식비', amount: '', memo: '' });
            return (
                <div className="space-y-6 max-h-[70vh] overflow-y-auto pr-2">
                    <div className="space-y-2">
                        {list.length === 0 ? <p className="text-center text-gray-300 py-10 text-xs font-bold">반복되는 고정 지출/수입을 등록하세요.</p> : list.map(i => (
                            <div key={i.id} className="flex justify-between items-center p-4 bg-gray-50 rounded-2xl border border-gray-100">
                                <div><span className={`text-[10px] font-black px-2 py-0.5 rounded ${i.type === 'income' ? 'bg-blue-100 text-blue-600' : 'bg-red-100 text-red-600'}`}>{i.frequency === 'yearly' ? `매년 ${i.month}월 ${i.day}일` : `매월 ${i.day}일`}</span><div className="font-bold text-sm mt-1">{i.memo}</div></div>
                                <div className="flex items-center gap-3"><span className="font-black text-sm">{formatCurrency(i.amount)}원</span><button onClick={() => onDelete(i.id)} className="text-gray-300 active:text-red-400 p-2"><Trash2 size={18}/></button></div>
                            </div>
                        ))}
                    </div>
                    <div className="p-4 bg-[#F8F9FA] rounded-[28px] space-y-3 border border-dashed border-gray-300">
                        <div className="flex gap-2">
                            <select className="flex-1 p-3 bg-white rounded-xl text-xs font-bold outline-none border-none" value={f.frequency} onChange={e => setF({...f, frequency: e.target.value})}><option value="monthly">매월</option><option value="yearly">매년</option></select>
                            {f.frequency === 'yearly' && <select className="w-20 p-3 bg-white rounded-xl text-xs font-bold outline-none border-none" value={f.month} onChange={e => setF({...f, month: Number(e.target.value)})}>{Array.from({length:12},(_,i)=>i+1).map(m=><option key={m} value={m}>{m}월</option>)}</select>}
                            <select className="w-20 p-3 bg-white rounded-xl text-xs font-bold outline-none border-none" value={f.day} onChange={e => setF({...f, day: Number(e.target.value)})}>{Array.from({length:31},(_,i)=>i+1).map(d=><option key={d} value={d}>{d}일</option>)}</select>
                            <select className="w-24 p-3 bg-white rounded-xl text-xs font-bold outline-none border-none" value={f.type} onChange={e => setF({...f, type: e.target.value, category: CATEGORIES[e.target.value][0]})}>{['expense','income'].map(v=><option key={v} value={v}>{v==='expense'?'지출':'수입'}</option>)}</select>
                        </div>
                        <div className="flex gap-2">
                            <select className="w-1/3 p-3 bg-white rounded-xl text-xs font-bold border-none outline-none" value={f.category} onChange={e => setF({...f, category: e.target.value})}>{CATEGORIES[f.type].map(c=><option key={c} value={c}>{c}</option>)}</select>
                            <input className="flex-1 p-3 bg-white rounded-xl text-xs font-bold outline-none" placeholder="내용" value={f.memo} onChange={e => setF({...f, memo: e.target.value})}/>
                            <input className="w-1/4 p-3 bg-white rounded-xl text-xs text-right font-black outline-none" placeholder="0" type="number" value={f.amount} onChange={e => setF({...f, amount: e.target.value})}/>
                        </div>
                        <button onClick={() => { if(f.memo && f.amount) { onAdd(f); setF({...f, memo:'', amount:''}); } }} className="w-full py-4 bg-[#3182F6] text-white rounded-2xl text-sm font-black active:scale-95 shadow-lg">반복 항목 추가</button>
                    </div>
                    <button onClick={onApply} className="w-full py-4 bg-[#E8F3FF] text-[#3182F6] font-black rounded-2xl active:scale-[0.98] transition-all">이달 내역에 일괄 반영하기</button>
                </div>
            );
        }

        // --- 렌더링 ---
        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
